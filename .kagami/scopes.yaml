schema_version: 1
language: swift

# kagami scope manifest for FJ-Studios/NetKit (module NetKit since v1.0.0).
scopes:
  - name: NetKit
    language: swift
    packagePath: .
    modulePatterns:
      - NetKit
    typePatterns:
      - NetKit
      - Bonjour
      - MDNSBrowser
      - MDNSAdvertiser
      - HTTPClient
      - WebSocket
    testFilePatterns:
      - "**/NetworkKitTests/**/*.swift"
